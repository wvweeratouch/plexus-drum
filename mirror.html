<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plexus Drum — Mirror</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: none; }
canvas { display: block; width: 100vw; height: 100vh; }
#clickOverlay {
  position: fixed; inset: 0; z-index: 10; background: rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  color: #00e5ff; font-family: 'Courier New', monospace; font-size: 1.5rem;
}
</style>
</head>
<body>
<div id="clickOverlay">click for fullscreen mirror</div>
<canvas id="c"></canvas>
<script type="module">
const overlay = document.getElementById('clickOverlay');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const bc = new BroadcastChannel('plexus-drum');

const POSE_JOINTS = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

let lastDataTime = 0;
let latestPoints = [];
let active = false;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function extractPixelPoints(data, w, h) {
  const points = [];
  if (data.mode === 'hands' && data.handLandmarks) {
    for (const hand of data.handLandmarks) {
      for (const lm of hand) {
        points.push({ px: lm.x * w, py: lm.y * h });
      }
    }
  } else if (data.mode === 'body' && data.poseLandmarks) {
    for (const pose of data.poseLandmarks) {
      for (const idx of POSE_JOINTS) {
        if (pose[idx]) {
          points.push({ px: pose[idx].x * w, py: pose[idx].y * h });
        }
      }
    }
  }
  return points;
}

bc.onmessage = (e) => {
  lastDataTime = performance.now();
  latestPoints = extractPixelPoints(e.data, canvas.width, canvas.height);
};

function drawPlexus(points, confidence) {
  const maxDist = 400;
  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dx = points[i].px - points[j].px;
      const dy = points[i].py - points[j].py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const opacity = (1 - dist / maxDist) * 0.5 * confidence;
        ctx.beginPath();
        ctx.moveTo(points[i].px, points[i].py);
        ctx.lineTo(points[j].px, points[j].py);
        ctx.strokeStyle = 'rgba(0, 229, 255, ' + opacity + ')';
        ctx.lineWidth = opacity > 0.25 ? 1.5 : 0.8;
        ctx.stroke();
      }
    }
  }
  for (const p of points) {
    ctx.beginPath();
    ctx.arc(p.px, p.py, 7, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 229, 255, ' + (0.12 * confidence) + ')';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.px, p.py, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 229, 255, ' + confidence + ')';
    ctx.fill();
  }
}

function draw() {
  requestAnimationFrame(draw);
  const now = performance.now();
  const silence = now - lastDataTime > 2000;

  // Solid black clear — fade to black on silence
  if (silence) {
    // Gradual fade
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    // Solid clear each frame (no trail for plexus)
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (latestPoints.length > 0) {
      drawPlexus(latestPoints, 0.85);
    }
  }
}

overlay.addEventListener('click', () => {
  overlay.style.display = 'none';
  document.documentElement.requestFullscreen().catch(() => {});
  active = true;
  requestAnimationFrame(draw);
});
</script>

<div id="blackoutOverlay" style="display:none;position:fixed;inset:0;background:#000;z-index:999999;cursor:pointer"></div>
<script>
(function(){
  const o=document.getElementById('blackoutOverlay');
  const t=()=>{o.style.display=o.style.display==='block'?'none':'block'};
  o.addEventListener('click',t);
  document.addEventListener('keydown',(e)=>{if(e.key==='b'||e.key==='B')t()});
})();
</script>
</body>
</html>
