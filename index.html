<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plexus Drum</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }

#startScreen {
  position: fixed; inset: 0; z-index: 100; background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
}
#startScreen h1 { font-size: 3rem; color: #00e5ff; margin-bottom: 1rem; letter-spacing: 0.2em; }
#startScreen p { font-size: 1.2rem; color: #888; }

#ui {
  height: 44px; display: flex; align-items: center; gap: 12px; padding: 0 12px;
  background: #111; border-bottom: 1px solid #333; font-size: 12px; flex-shrink: 0;
  position: relative; z-index: 10;
}
#ui label { color: #999; }
#ui input[type="range"] { width: 70px; accent-color: #00e5ff; vertical-align: middle; }
#ui button, #ui select {
  background: #222; color: #00e5ff; border: 1px solid #444; padding: 3px 10px;
  font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 3px;
}
#ui button:hover, #ui select:hover { background: #333; }
#ui button.active { background: #00e5ff; color: #0a0a0a; }
#ui .sep { width: 1px; height: 24px; background: #333; }

#main { position: relative; height: calc(100vh - 44px); }
#visualCanvas { width: 100%; height: 100%; display: block; }

/* Camera preview — small bottom-left overlay */
#camPreview {
  position: absolute; bottom: 12px; left: 12px; z-index: 5;
  width: 160px; height: 90px; border: 1px solid #333; border-radius: 4px; overflow: hidden;
  background: #000;
}
#camPreview video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

/* Dashboard — right side overlay */
#dashboard {
  position: absolute; top: 12px; right: 12px; z-index: 5;
  background: rgba(0,0,0,0.7); border: 1px solid #333; border-radius: 6px;
  padding: 12px 16px; font-size: 12px; min-width: 160px;
}
#dashboard .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
#dashboard .row:last-child { margin-bottom: 0; }
#dashboard .label { color: #888; min-width: 55px; }
#dashboard .value { color: #00e5ff; font-weight: bold; }
#dashboard .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
#dashboard .dot.active { background: #0f0; }
.velBar { width: 60px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
.velBar .fill { height: 100%; background: #00e5ff; transition: width 50ms; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>PLEXUS DRUM</h1>
  <p>click to start</p>
</div>

<div id="ui" style="display:none;">
  <label>Vol <input type="range" id="volSlider" min="0" max="100" value="80"></label>
  <div class="sep"></div>
  <button id="modeBtn">Hands</button>
  <div class="sep"></div>
  <button id="echoBtn" class="active">Echo ON</button>
  <div class="sep"></div>
  <label>Retrig <input type="range" id="retrigSlider" min="10" max="300" value="50"></label>
  <span id="retrigVal" style="color:#888;font-size:11px;">50ms</span>
  <div class="sep"></div>
  <button id="visualBtn">Plexus</button>
  <div class="sep"></div>
  <label>Persons <select id="personsSel">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select></label>
</div>

<div id="main" style="display:none;">
  <canvas id="visualCanvas"></canvas>
  <div id="camPreview">
    <video id="video" autoplay playsinline muted></video>
  </div>
  <div id="dashboard">
    <div class="row">
      <div class="dot" id="trackDot"></div>
      <span class="label">Tracking</span>
      <span class="value" id="dashHands">-</span>
    </div>
    <div class="row">
      <span class="label">Velocity</span>
      <div class="velBar"><div class="fill" id="velFill" style="width:0%"></div></div>
      <span class="value" id="dashVel">0%</span>
    </div>
    <div class="row">
      <span class="label">Spread</span>
      <span class="value" id="dashSpread">-</span>
    </div>
    <div class="row">
      <span class="label">Gesture</span>
      <span class="value" id="dashGesture">-</span>
    </div>
  </div>
</div>

<script type="module">
import { FilesetResolver, HandLandmarker, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── DOM ──
const startScreen = document.getElementById('startScreen');
const ui = document.getElementById('ui');
const mainDiv = document.getElementById('main');
const video = document.getElementById('video');
const visCanvas = document.getElementById('visualCanvas');
const visCtx = visCanvas.getContext('2d');

const volSlider = document.getElementById('volSlider');
const modeBtn = document.getElementById('modeBtn');
const echoBtn = document.getElementById('echoBtn');
const retrigSlider = document.getElementById('retrigSlider');
const retrigVal = document.getElementById('retrigVal');
const visualBtn = document.getElementById('visualBtn');
const personsSel = document.getElementById('personsSel');

// Dashboard
const trackDot = document.getElementById('trackDot');
const dashHands = document.getElementById('dashHands');
const dashVel = document.getElementById('dashVel');
const velFill = document.getElementById('velFill');
const dashSpread = document.getElementById('dashSpread');
const dashGesture = document.getElementById('dashGesture');

// ── State ──
let mode = 'hands';
let echoOn = true;
let visualMode = 'plexus';
let volScale = 0.8;
let numPersons = 1;
let retriggerMs = 50;
let lastTriggerTime = 0;
let prevLandmarks = null;
let handLandmarker = null;
let poseLandmarker = null;
let running = false;
let lastDetectTimestamp = 0;

// BroadcastChannel
const bc = new BroadcastChannel('plexus-drum');

// ── Audio ──
let audioCtx = null;
let dryGain = null;
let echoDelay = null;
let echoFeedback = null;
let echoFilter = null;
let echoWet = null;
let analyser = null;

function initAudio() {
  audioCtx = new AudioContext();
  dryGain = audioCtx.createGain();
  dryGain.gain.value = 1;
  dryGain.connect(audioCtx.destination);

  // Echo chain: dry -> delay -> feedback loop (with lowpass) -> wet -> destination
  echoDelay = audioCtx.createDelay(1);
  echoDelay.delayTime.value = 0.18; // 180ms
  echoFeedback = audioCtx.createGain();
  echoFeedback.gain.value = 0.35;
  echoFilter = audioCtx.createBiquadFilter();
  echoFilter.type = 'lowpass';
  echoFilter.frequency.value = 3000;
  echoWet = audioCtx.createGain();
  echoWet.gain.value = 0.3; // Echo ON by default

  dryGain.connect(echoDelay);
  echoDelay.connect(echoFilter);
  echoFilter.connect(echoFeedback);
  echoFeedback.connect(echoDelay);
  echoDelay.connect(echoWet);
  echoWet.connect(audioCtx.destination);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  dryGain.connect(analyser);
}

function playKick(v) {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g);
  g.connect(dryGain);
  osc.start(t);
  osc.stop(t + 0.2);
}

function playSnare(v) {
  const t = audioCtx.currentTime;
  const bufLen = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 3000;
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(v * 0.8, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.connect(bp);
  bp.connect(gn);
  gn.connect(dryGain);
  noise.start(t);
  noise.stop(t + 0.1);
  // Sine body
  const osc = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
  g2.gain.setValueAtTime(v * 0.5, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(g2);
  g2.connect(dryGain);
  osc.start(t);
  osc.stop(t + 0.08);
}

function playHiHat(v) {
  const t = audioCtx.currentTime;
  const bufLen = audioCtx.sampleRate * 0.04;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 7000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(v * 0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  noise.connect(hp);
  hp.connect(g);
  g.connect(dryGain);
  noise.start(t);
  noise.stop(t + 0.04);
}

// ── Controls ──
modeBtn.addEventListener('click', () => {
  mode = mode === 'hands' ? 'body' : 'hands';
  modeBtn.textContent = mode === 'hands' ? 'Hands' : 'Body';
  prevLandmarks = null;
});

echoBtn.addEventListener('click', () => {
  echoOn = !echoOn;
  echoBtn.textContent = echoOn ? 'Echo ON' : 'Echo OFF';
  echoBtn.classList.toggle('active', echoOn);
  if (echoWet) echoWet.gain.value = echoOn ? 0.3 : 0;
});

visualBtn.addEventListener('click', () => {
  visualMode = visualMode === 'plexus' ? 'waveform' : 'plexus';
  visualBtn.textContent = visualMode === 'plexus' ? 'Plexus' : 'Waveform';
});

retrigSlider.addEventListener('input', () => {
  retriggerMs = parseInt(retrigSlider.value);
  retrigVal.textContent = retriggerMs + 'ms';
});
volSlider.addEventListener('input', () => { volScale = volSlider.value / 100; });
personsSel.addEventListener('change', async () => {
  numPersons = parseInt(personsSel.value);
  await rebuildLandmarkers();
});

// ── MediaPipe ──
async function initMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );

  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numHands: numPersons * 2
  });

  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numPoses: numPersons
  });
}

async function rebuildLandmarkers() {
  if (handLandmarker) { handLandmarker.close(); handLandmarker = null; }
  if (poseLandmarker) { poseLandmarker.close(); poseLandmarker = null; }
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numHands: numPersons * 2
  });
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numPoses: numPersons
  });
}

// ── Camera ──
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 360, facingMode: 'user' }
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadeddata = r; });
}

// ── Pose joint indices ──
const POSE_JOINTS = [0, 11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

// ── Finger tip indices for spread calculation ──
const FINGER_TIPS = [4, 8, 12, 16, 20];

// ── Compute finger spread (average pairwise distance between fingertips) ──
function computeSpread(handLandmarks) {
  // Use the first hand that has landmarks
  if (!handLandmarks || handLandmarks.length === 0) return 0;
  const hand = handLandmarks[0];
  let totalDist = 0;
  let pairs = 0;
  for (let i = 0; i < FINGER_TIPS.length; i++) {
    for (let j = i + 1; j < FINGER_TIPS.length; j++) {
      const a = hand[FINGER_TIPS[i]];
      const b = hand[FINGER_TIPS[j]];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      totalDist += Math.sqrt(dx * dx + dy * dy);
      pairs++;
    }
  }
  return totalDist / pairs; // 10 pairs
}

// ── Compute average velocity of all landmarks ──
function computeAvgVelocity(currentPoints) {
  if (!prevLandmarks || prevLandmarks.length !== currentPoints.length || currentPoints.length === 0) {
    prevLandmarks = currentPoints.map(p => ({x: p.x, y: p.y}));
    return 0;
  }
  let totalV = 0;
  for (let i = 0; i < currentPoints.length; i++) {
    const dx = currentPoints[i].x - prevLandmarks[i].x;
    const dy = currentPoints[i].y - prevLandmarks[i].y;
    totalV += Math.sqrt(dx * dx + dy * dy);
  }
  prevLandmarks = currentPoints.map(p => ({x: p.x, y: p.y}));
  return totalV / currentPoints.length;
}

// ── Plexus drawing ──
function drawPlexus(ctx, points, w, h, confidence) {
  const maxDist = 400;
  // Lines between all pairs
  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dx = points[i].px - points[j].px;
      const dy = points[i].py - points[j].py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const opacity = (1 - dist / maxDist) * 0.5 * confidence;
        ctx.beginPath();
        ctx.moveTo(points[i].px, points[i].py);
        ctx.lineTo(points[j].px, points[j].py);
        ctx.strokeStyle = 'rgba(0, 229, 255, ' + opacity + ')';
        ctx.lineWidth = opacity > 0.25 ? 1.5 : 0.8;
        ctx.stroke();
      }
    }
  }
  // Nodes
  for (const p of points) {
    // Glow halo
    ctx.beginPath();
    ctx.arc(p.px, p.py, 7, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 229, 255, ' + (0.12 * confidence) + ')';
    ctx.fill();
    // Node
    ctx.beginPath();
    ctx.arc(p.px, p.py, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 229, 255, ' + confidence + ')';
    ctx.fill();
  }
}

// ── Main Loop ──
let lastFrameTime = 0;

function loop(timestamp) {
  if (!running) return;
  requestAnimationFrame(loop);

  if (timestamp - lastFrameTime < 16) return;
  lastFrameTime = timestamp;

  // Strictly increasing timestamps for detectForVideo
  const ts = performance.now();
  if (ts <= lastDetectTimestamp) return;
  lastDetectTimestamp = ts;

  let handResults = null;
  let poseResults = null;

  if (mode === 'hands' && handLandmarker) {
    handResults = handLandmarker.detectForVideo(video, ts);
  } else if (mode === 'body' && poseLandmarker) {
    poseResults = poseLandmarker.detectForVideo(video, ts);
  }

  const handLandmarks = handResults ? handResults.landmarks : [];
  const poseLandmarks = poseResults ? poseResults.landmarks : [];

  // Broadcast landmarks for mirror
  bc.postMessage({
    mode,
    handLandmarks: handLandmarks.map(h => h.map(l => ({x: l.x, y: l.y, z: l.z || 0}))),
    poseLandmarks: poseLandmarks.map(p => p.map(l => ({x: l.x, y: l.y, z: l.z || 0})))
  });

  // Resize canvas
  visCanvas.width = visCanvas.clientWidth;
  visCanvas.height = visCanvas.clientHeight;
  const w = visCanvas.width;
  const h = visCanvas.height;

  // Collect all points for plexus
  const allPoints = [];
  const confidence = 0.85;

  if (mode === 'hands') {
    for (const hand of handLandmarks) {
      for (const lm of hand) {
        allPoints.push({ x: lm.x, y: lm.y, px: lm.x * w, py: lm.y * h });
      }
    }
  } else {
    for (const pose of poseLandmarks) {
      for (const idx of POSE_JOINTS) {
        if (pose[idx]) {
          allPoints.push({ x: pose[idx].x, y: pose[idx].y, px: pose[idx].x * w, py: pose[idx].y * h });
        }
      }
    }
  }

  // Compute velocity (avg of ALL landmarks)
  const avgVel = computeAvgVelocity(allPoints);
  const velocity = Math.min(avgVel * 15, 1);

  // Compute spread (hands mode only)
  let spread = 0;
  let gesture = '-';
  const now = performance.now();

  if (mode === 'hands' && handLandmarks.length > 0) {
    spread = computeSpread(handLandmarks);

    // Trigger drums based on gesture (spread) and velocity
    if (velocity > 0.05 && now - lastTriggerTime >= retriggerMs) {
      lastTriggerTime = now;
      const vol = velocity * volScale;

      if (spread < 0.15) {
        // FIST -> Kick
        playKick(vol);
        gesture = 'Fist>Kick';
      } else if (spread > 0.4) {
        // OPEN HAND -> HiHat
        playHiHat(vol);
        gesture = 'Open>HiHat';
      } else {
        // MID -> Snare
        playSnare(vol);
        gesture = 'Mid>Snare';
      }
    } else if (handLandmarks.length > 0) {
      // Update gesture label even without trigger
      if (spread < 0.15) gesture = 'Fist>Kick';
      else if (spread > 0.4) gesture = 'Open>HiHat';
      else gesture = 'Mid>Snare';
    }
  } else if (mode === 'body' && poseLandmarks.length > 0) {
    // Body mode: velocity zones (like CEING afterlife scene 4)
    if (velocity > 0.05 && now - lastTriggerTime >= retriggerMs) {
      lastTriggerTime = now;
      const vol = velocity * volScale;
      playKick(vol * 0.6);
      playSnare(vol);
      if (velocity > 0.5) playHiHat(vol * 0.7);
      gesture = velocity > 0.5 ? 'High>All' : 'Move>K+S';
    } else if (poseLandmarks.length > 0) {
      gesture = velocity > 0.5 ? 'High>All' : velocity > 0.05 ? 'Move>K+S' : 'Still';
    }
  }

  // ── Update Dashboard ──
  const hasTracking = allPoints.length > 0;
  trackDot.classList.toggle('active', hasTracking);
  if (mode === 'hands') {
    dashHands.textContent = handLandmarks.length > 0 ? handLandmarks.length + ' hand' + (handLandmarks.length > 1 ? 's' : '') : '-';
  } else {
    dashHands.textContent = poseLandmarks.length > 0 ? poseLandmarks.length + ' pose' + (poseLandmarks.length > 1 ? 's' : '') : '-';
  }
  const velPct = Math.round(velocity * 100);
  dashVel.textContent = velPct + '%';
  velFill.style.width = velPct + '%';
  dashSpread.textContent = mode === 'hands' && handLandmarks.length > 0 ? spread.toFixed(3) : '-';
  dashGesture.textContent = gesture;

  // ── Draw Visual ──
  // Clear to solid black (no trail for plexus)
  visCtx.fillStyle = '#0a0a0a';
  visCtx.fillRect(0, 0, w, h);

  if (visualMode === 'plexus') {
    if (allPoints.length > 0) {
      drawPlexus(visCtx, allPoints, w, h, confidence);
    } else {
      // No hands — show prompt
      visCtx.font = '24px "Courier New", monospace';
      visCtx.fillStyle = 'rgba(0, 229, 255, 0.5)';
      visCtx.textAlign = 'center';
      visCtx.textBaseline = 'middle';
      visCtx.fillText('Show your hands', w / 2, h / 2);
    }
  } else {
    // Waveform mode
    if (analyser) {
      const bufLen = analyser.frequencyBinCount;
      const dataArr = new Uint8Array(bufLen);
      analyser.getByteFrequencyData(dataArr);
      const barW = w / bufLen;
      for (let i = 0; i < bufLen; i++) {
        const barH = (dataArr[i] / 255) * h * 0.8;
        const alpha = 0.3 + (dataArr[i] / 255) * 0.7;
        visCtx.fillStyle = 'rgba(0, 229, 255, ' + alpha + ')';
        visCtx.fillRect(i * barW, h - barH, barW - 1, barH);
      }
    }
    // Still show "no hands" if nothing tracked
    if (allPoints.length === 0) {
      visCtx.font = '24px "Courier New", monospace';
      visCtx.fillStyle = 'rgba(0, 229, 255, 0.3)';
      visCtx.textAlign = 'center';
      visCtx.textBaseline = 'middle';
      visCtx.fillText('Show your hands', w / 2, h / 2);
    }
  }
}

// ── Start ──
startScreen.addEventListener('click', async () => {
  startScreen.style.display = 'none';
  ui.style.display = 'flex';
  mainDiv.style.display = 'block';

  initAudio();
  await initCamera();
  await initMediaPipe();
  running = true;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
