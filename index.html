<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plexus Drum</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }

#startScreen {
  position: fixed; inset: 0; z-index: 100; background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
}
#startScreen h1 { font-size: 3rem; color: #d4a840; margin-bottom: 1rem; }
#startScreen p { font-size: 1.2rem; color: #888; }

#ui {
  height: 44px; display: flex; align-items: center; gap: 12px; padding: 0 12px;
  background: #111; border-bottom: 1px solid #333; font-size: 12px; flex-shrink: 0;
}
#ui label { color: #999; }
#ui input[type="range"] { width: 70px; accent-color: #d4a840; vertical-align: middle; }
#ui button, #ui select {
  background: #222; color: #d4a840; border: 1px solid #444; padding: 3px 10px;
  font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 3px;
}
#ui button:hover, #ui select:hover { background: #333; }
#ui button.active { background: #d4a840; color: #0a0a0a; }
#ui .sep { width: 1px; height: 24px; background: #333; }

#main { display: flex; height: calc(100vh - 44px); }
#monitor { width: 35%; position: relative; background: #080808; overflow: hidden; }
#visual { width: 65%; position: relative; background: #0a0a0a; }

#monitorCanvas, #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
#video { opacity: 0.5; }
#monitorCanvas { z-index: 1; }
#status {
  position: absolute; bottom: 8px; left: 8px; z-index: 2;
  font-size: 11px; color: #888; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 3px;
}
#visualCanvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>PLEXUS DRUM</h1>
  <p>click to start</p>
</div>

<div id="ui" style="display:none;">
  <label>Vol <input type="range" id="volSlider" min="0" max="100" value="80"></label>
  <div class="sep"></div>
  <button id="modeBtn">Hands</button>
  <div class="sep"></div>
  <button id="echoBtn">Echo OFF</button>
  <div class="sep"></div>
  <label>PoseT <input type="range" id="threshSlider" min="1" max="20" value="5"></label>
  <div class="sep"></div>
  <button id="visualBtn">Flashes</button>
  <div class="sep"></div>
  <label>Persons <select id="personsSel">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select></label>
</div>

<div id="main" style="display:none;">
  <div id="monitor">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="monitorCanvas"></canvas>
    <div id="status">Starting...</div>
  </div>
  <div id="visual">
    <canvas id="visualCanvas"></canvas>
  </div>
</div>

<script type="module">
import { FilesetResolver, HandLandmarker, PoseLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── DOM ──
const startScreen = document.getElementById('startScreen');
const ui = document.getElementById('ui');
const mainDiv = document.getElementById('main');
const video = document.getElementById('video');
const monCanvas = document.getElementById('monitorCanvas');
const monCtx = monCanvas.getContext('2d');
const visCanvas = document.getElementById('visualCanvas');
const visCtx = visCanvas.getContext('2d');
const statusEl = document.getElementById('status');

const volSlider = document.getElementById('volSlider');
const modeBtn = document.getElementById('modeBtn');
const echoBtn = document.getElementById('echoBtn');
const threshSlider = document.getElementById('threshSlider');
const visualBtn = document.getElementById('visualBtn');
const personsSel = document.getElementById('personsSel');

// ── State ──
let mode = 'hands'; // 'hands' | 'body'
let echoOn = false;
let visualMode = 'flashes'; // 'flashes' | 'waveform'
let threshold = 0.05;
let volScale = 0.8;
let numPersons = 1;
let poseVel = 0;
let lastTriggerTime = 0;
let prevLandmarks = null;
let handLandmarker = null;
let poseLandmarker = null;
let running = false;

// Flash particles
const flashes = [];

// BroadcastChannel
const bc = new BroadcastChannel('plexus-drum');

// ── Audio ──
let audioCtx = null;
let dryGain = null;
let echoDelay = null;
let echoFeedback = null;
let echoWet = null;
let analyser = null;

function initAudio() {
  audioCtx = new AudioContext();
  dryGain = audioCtx.createGain();
  dryGain.gain.value = 1;
  dryGain.connect(audioCtx.destination);

  // Echo chain
  echoDelay = audioCtx.createDelay(1);
  echoDelay.delayTime.value = 0.12;
  echoFeedback = audioCtx.createGain();
  echoFeedback.gain.value = 0.35;
  echoWet = audioCtx.createGain();
  echoWet.gain.value = 0;

  dryGain.connect(echoDelay);
  echoDelay.connect(echoFeedback);
  echoFeedback.connect(echoDelay);
  echoDelay.connect(echoWet);
  echoWet.connect(audioCtx.destination);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  dryGain.connect(analyser);
}

function plxKick(v) {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g);
  g.connect(dryGain);
  osc.start(t);
  osc.stop(t + 0.2);
}

function plxSnare(v) {
  const t = audioCtx.currentTime;
  // Noise
  const bufLen = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 3000;
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(v * 0.8, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  noise.connect(bp);
  bp.connect(gn);
  gn.connect(dryGain);
  noise.start(t);
  noise.stop(t + 0.1);
  // Sine body
  const osc = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
  g2.gain.setValueAtTime(v * 0.5, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(g2);
  g2.connect(dryGain);
  osc.start(t);
  osc.stop(t + 0.08);
}

function plxHiHat(v) {
  const t = audioCtx.currentTime;
  const bufLen = audioCtx.sampleRate * 0.04;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 7000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(v * 0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  noise.connect(hp);
  hp.connect(g);
  g.connect(dryGain);
  noise.start(t);
  noise.stop(t + 0.04);
}

// ── Controls ──
modeBtn.addEventListener('click', () => {
  mode = mode === 'hands' ? 'body' : 'hands';
  modeBtn.textContent = mode === 'hands' ? 'Hands' : 'Body';
  prevLandmarks = null;
  poseVel = 0;
});

echoBtn.addEventListener('click', () => {
  echoOn = !echoOn;
  echoBtn.textContent = echoOn ? 'Echo ON' : 'Echo OFF';
  echoBtn.classList.toggle('active', echoOn);
  if (echoWet) echoWet.gain.value = echoOn ? 0.3 : 0;
});

visualBtn.addEventListener('click', () => {
  visualMode = visualMode === 'flashes' ? 'waveform' : 'flashes';
  visualBtn.textContent = visualMode === 'flashes' ? 'Flashes' : 'Waveform';
});

threshSlider.addEventListener('input', () => { threshold = threshSlider.value / 100; });
volSlider.addEventListener('input', () => { volScale = volSlider.value / 100; });
personsSel.addEventListener('change', async () => {
  numPersons = parseInt(personsSel.value);
  await rebuildLandmarkers();
});

// ── MediaPipe ──
async function initMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );

  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numHands: numPersons * 2
  });

  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numPoses: numPersons
  });
}

async function rebuildLandmarkers() {
  if (handLandmarker) {
    handLandmarker.close();
    handLandmarker = null;
  }
  if (poseLandmarker) {
    poseLandmarker.close();
    poseLandmarker = null;
  }
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numHands: numPersons * 2
  });
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU'
    },
    runningMode: 'VIDEO',
    numPoses: numPersons
  });
}

// ── Camera ──
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 360, facingMode: 'user' }
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadeddata = r; });
}

// ── Pose joint indices: shoulders, elbows, wrists, hips, knees, ankles ──
const POSE_JOINTS = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

// ── Main Loop ──
function extractPoints(results) {
  const points = [];
  if (mode === 'hands' && results.handLandmarks) {
    for (const hand of results.handLandmarks) {
      for (const lm of hand) {
        points.push({ x: lm.x, y: lm.y, z: lm.z || 0 });
      }
    }
  } else if (mode === 'body' && results.poseLandmarks) {
    for (const pose of results.poseLandmarks) {
      for (const idx of POSE_JOINTS) {
        if (pose[idx]) {
          points.push({ x: pose[idx].x, y: pose[idx].y, z: pose[idx].z || 0 });
        }
      }
    }
  }
  return points;
}

function computeMaxVelocity(currentPoints) {
  if (!prevLandmarks || prevLandmarks.length !== currentPoints.length) {
    prevLandmarks = currentPoints;
    return 0;
  }
  let maxV = 0;
  let maxIdx = 0;
  for (let i = 0; i < currentPoints.length; i++) {
    const dx = currentPoints[i].x - prevLandmarks[i].x;
    const dy = currentPoints[i].y - prevLandmarks[i].y;
    const dz = currentPoints[i].z - prevLandmarks[i].z;
    const v = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (v > maxV) { maxV = v; maxIdx = i; }
  }
  prevLandmarks = currentPoints;
  return maxV;
}

let lastFrameTime = 0;

function loop(timestamp) {
  if (!running) return;
  requestAnimationFrame(loop);

  if (timestamp - lastFrameTime < 16) return; // ~60fps cap
  lastFrameTime = timestamp;

  const ts = performance.now();
  let handResults = null;
  let poseResults = null;

  if (mode === 'hands' && handLandmarker) {
    handResults = handLandmarker.detectForVideo(video, ts);
  } else if (mode === 'body' && poseLandmarker) {
    poseResults = poseLandmarker.detectForVideo(video, ts);
  }

  const results = {
    handLandmarks: handResults ? handResults.landmarks : [],
    poseLandmarks: poseResults ? poseResults.landmarks : []
  };

  // Broadcast
  bc.postMessage({ mode, handLandmarks: results.handLandmarks, poseLandmarks: results.poseLandmarks });

  const points = extractPoints(results);
  const rawVel = computeMaxVelocity(points);

  // Smooth
  poseVel = poseVel * 0.7 + rawVel * 0.3;

  // Trigger
  const now = performance.now();
  let triggered = false;
  let speedNorm = 0;

  if (poseVel >= threshold) {
    speedNorm = Math.min((poseVel - threshold) / (0.3 - threshold), 1);
    if (speedNorm < 0) speedNorm = 0;
    const retriggerTime = 150 - (150 - 15) * speedNorm;

    if (now - lastTriggerTime >= retriggerTime) {
      lastTriggerTime = now;
      triggered = true;
      const vol = Math.min(speedNorm * 1.2, 1) * volScale;

      plxKick(vol * 0.6);
      plxSnare(vol);
      if (poseVel > 0.03) plxHiHat(vol * 0.7);

      // Add flashes at triggering points
      if (points.length > 0) {
        // Find the top velocity points for flash positions
        const flashCount = Math.min(points.length, 5);
        for (let i = 0; i < flashCount; i++) {
          const idx = Math.floor(Math.random() * points.length);
          flashes.push({
            x: points[idx].x,
            y: points[idx].y,
            r: 4 + speedNorm * 20,
            alpha: 1,
            birth: now
          });
        }
      }
    }
  }

  // ── Draw Monitor ──
  monCanvas.width = monCanvas.clientWidth;
  monCanvas.height = monCanvas.clientHeight;
  monCtx.clearRect(0, 0, monCanvas.width, monCanvas.height);

  const scaleX = monCanvas.width;
  const scaleY = monCanvas.height;

  // Draw hand landmarks (gold dots)
  if (results.handLandmarks) {
    for (const hand of results.handLandmarks) {
      monCtx.fillStyle = '#d4a840';
      for (const lm of hand) {
        monCtx.beginPath();
        monCtx.arc(lm.x * scaleX, lm.y * scaleY, 3, 0, Math.PI * 2);
        monCtx.fill();
      }
      // Connect fingers
      const connections = [
        [0,1],[1,2],[2,3],[3,4],
        [0,5],[5,6],[6,7],[7,8],
        [0,9],[9,10],[10,11],[11,12],
        [0,13],[13,14],[14,15],[15,16],
        [0,17],[17,18],[18,19],[19,20],
        [5,9],[9,13],[13,17]
      ];
      monCtx.strokeStyle = 'rgba(212,168,64,0.5)';
      monCtx.lineWidth = 1;
      for (const [a, b] of connections) {
        monCtx.beginPath();
        monCtx.moveTo(hand[a].x * scaleX, hand[a].y * scaleY);
        monCtx.lineTo(hand[b].x * scaleX, hand[b].y * scaleY);
        monCtx.stroke();
      }
    }
  }

  // Draw pose skeleton (green)
  if (results.poseLandmarks) {
    const poseConnections = [
      [11,12],[11,13],[13,15],[12,14],[14,16],
      [11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]
    ];
    for (const pose of results.poseLandmarks) {
      monCtx.fillStyle = '#3a3';
      for (const idx of POSE_JOINTS) {
        if (pose[idx]) {
          monCtx.beginPath();
          monCtx.arc(pose[idx].x * scaleX, pose[idx].y * scaleY, 4, 0, Math.PI * 2);
          monCtx.fill();
        }
      }
      monCtx.strokeStyle = 'rgba(50,200,50,0.6)';
      monCtx.lineWidth = 2;
      for (const [a, b] of poseConnections) {
        if (pose[a] && pose[b]) {
          monCtx.beginPath();
          monCtx.moveTo(pose[a].x * scaleX, pose[a].y * scaleY);
          monCtx.lineTo(pose[b].x * scaleX, pose[b].y * scaleY);
          monCtx.stroke();
        }
      }
    }
  }

  // Status
  const retrigMs = poseVel >= threshold ? Math.round(150 - (150 - 15) * speedNorm) : '-';
  statusEl.textContent = `vel: ${poseVel.toFixed(4)} | retrig: ${retrigMs}ms | mode: ${mode}`;

  // ── Draw Visual ──
  visCanvas.width = visCanvas.clientWidth;
  visCanvas.height = visCanvas.clientHeight;

  // Fade trail
  visCtx.fillStyle = 'rgba(10,10,10,0.15)';
  visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);

  if (visualMode === 'flashes') {
    // Draw and age flashes
    for (let i = flashes.length - 1; i >= 0; i--) {
      const f = flashes[i];
      const age = now - f.birth;
      f.alpha = Math.max(0, 1 - age / 200);
      if (f.alpha <= 0) { flashes.splice(i, 1); continue; }
      visCtx.beginPath();
      visCtx.arc(f.x * visCanvas.width, f.y * visCanvas.height, f.r * f.alpha, 0, Math.PI * 2);
      visCtx.fillStyle = `rgba(212,168,64,${f.alpha})`;
      visCtx.fill();
      // Glow
      visCtx.beginPath();
      visCtx.arc(f.x * visCanvas.width, f.y * visCanvas.height, f.r * 2 * f.alpha, 0, Math.PI * 2);
      visCtx.fillStyle = `rgba(255,220,120,${f.alpha * 0.3})`;
      visCtx.fill();
    }
  } else {
    // Waveform
    if (analyser) {
      const bufLen = analyser.frequencyBinCount;
      const dataArr = new Uint8Array(bufLen);
      analyser.getByteFrequencyData(dataArr);
      const barW = visCanvas.width / bufLen;
      for (let i = 0; i < bufLen; i++) {
        const barH = (dataArr[i] / 255) * visCanvas.height * 0.8;
        visCtx.fillStyle = `rgba(212,168,64,${0.3 + (dataArr[i] / 255) * 0.7})`;
        visCtx.fillRect(i * barW, visCanvas.height - barH, barW - 1, barH);
      }
    }
  }
}

// ── Start ──
startScreen.addEventListener('click', async () => {
  startScreen.style.display = 'none';
  ui.style.display = 'flex';
  mainDiv.style.display = 'flex';

  initAudio();
  statusEl.textContent = 'Loading models...';
  await initCamera();
  await initMediaPipe();
  statusEl.textContent = 'Ready';
  running = true;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
